<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo de Caixa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <script type="module" src="../js/script.js"></script>
  <!-- Header -->
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <i class="fas fa-cash-register"></i>
        <span>Fluxo de Caixa</span>
      </div>
      <div class="navbar-menu">
        <a href="caixa.html" class="nav-link active">
          <i class="fas fa-home"></i>Início
        </a>
        <a href="transacoes.html" class="nav-link">
          <i class="fas fa-list"></i> Transações
        </a>
        <a href="estoque.html" class="nav-link">
          <i class="fas fa-boxes"></i> Estoque
        </a>
        <a href="mensalidade.html" class="nav-link">
          <i class="fas fa-file-invoice-dollar"></i> Mensalidades
        </a>
      </div>
      <button id="logout-btn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
    </div>
  </header>

  <div class="main-container">
    <div class="container">
      <!-- Seção de Saldo -->
      <div class="saldo-section">
        <div class="saldo-card">
          <div class="saldo-icon">
            <i class="fas fa-wallet"></i>
          </div>
          <div class="saldo-content">
            <p class="saldo-label">Saldo Total</p>
            <h2 id="saldo" class="saldo-valor">R$ 0,00</h2>
          </div>
        </div>
      </div>

      <!-- Seção de Formulário -->
      <section class="form-section">
        <h3 class="section-title">
          <i class="fas fa-plus-circle"></i> Nova Transação
        </h3>
        <form id="form-transacao" class="form-transacao">
          <div class="form-group">
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" placeholder="Ex: Venda de produtos" required>
          </div>
          <div class="form-group">
            <label for="valor">Valor</label>
            <input type="number" id="valor" placeholder="0,00" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="tipo">Tipo</label>
            <select id="tipo" required>
              <option value="">Selecione...</option>
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
            </select>
          </div>
          <div class="form-group">
            <label for="mes">Mês</label>
            <input type="month" id="mes" required>
          </div>
          <button type="submit" class="btn-primary">
            <i class="fas fa-plus"></i> Adicionar
          </button>
        </form>
      </section>


    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Barbearia Gringa - Fluxo de Caixa</p>
  </footer>

</body>

</html>
