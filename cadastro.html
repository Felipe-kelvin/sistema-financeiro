<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Fluxo de Caixa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --bg-light: #f9fafb;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========================================
       BODY & LAYOUT
       ======================================== */

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-primary);
        }

        .container {
            background: white;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    input {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      transition: var(--transition);
      background: var(--bg-light);
      color: var(--text-primary);
    }

    input::placeholder {
      color: var(--text-secondary);
    }

    button {
      padding: 0.875rem 1.5rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }


    </style>
</head>

<body>
    <div class="container">
        <div class="login-header">
        <h1>Painel de Cadastro</h1>
        </div>
        <form id="form-cadastro">
            <input type="email" id="email" placeholder="Nome de usuário" required autocomplete="username">
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Cadastrar</button>
            <button type="button" onclick="window.location.href = 'index.html'">Voltar para Login</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdok04xMPLJQ4FUhM9b6LFfSZyWDPeEoQ",
            authDomain: "sistema-caixa-efe6e.firebaseapp.com",
            projectId: "sistema-caixa-efe6e"
        };

        // 🔥 inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const auth = getAuth();
        const db = getFirestore();

        document.getElementById("form-cadastro").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value.trim();

            try {
                // 🔐 cria o usuário
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);

                const user = userCredential.user;

                // 📦 cria estrutura no Firestore
                await setDoc(doc(db, "users", user.uid), {
                    criadoEm: new Date(),
                    email: user.email
                });

                alert("Usuário cadastrado com sucesso!");

                console.log("Usuário criado com sucesso!");

            } catch (error) {
                console.error("Erro:", error.message);
            }
        });
    </script>
</body>

</html>
