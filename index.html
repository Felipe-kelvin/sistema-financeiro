<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fluxo de Caixa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ========================================
       RESET & VARIÁVEIS
       ======================================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --bg-light: #f9fafb;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========================================
       BODY & LAYOUT
       ======================================== */

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--text-primary);
    }

    /* ========================================
       CONTAINER
       ======================================== */

    .container {
      background: white;
      border-radius: 0.75rem;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========================================
       HEADER
       ======================================== */

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-icon {
      font-size: 3rem;
      color: var(--primary-color);
      margin-bottom: 1rem;
      display: inline-block;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* ========================================
       FORM
       ======================================== */

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    label i {
      color: var(--primary-color);
      width: 1rem;
    }

    input {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      transition: var(--transition);
      background: var(--bg-light);
      color: var(--text-primary);
    }

    input::placeholder {
      color: var(--text-secondary);
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: white;
    }

    /* ========================================
       BUTTON
       ======================================== */

    button {
      padding: 0.875rem 1.5rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    /* ========================================
       ERROR MESSAGE
       ======================================== */

    .erro {
      display: none;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: fadeIn 0.3s ease-out;
    }

    .erro.show {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* ========================================
       LOADING STATE
       ======================================== */

    button.loading {
      opacity: 0.8;
      pointer-events: none;
    }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ========================================
       FOOTER
       ======================================== */

    .login-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    /* ========================================
       RESPONSIVE - LOGIN
       ======================================== */

    /* Tablets (768px e abaixo) */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .container {
        max-width: 100%;
        padding: 2rem 1.5rem;
        border-radius: 0.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .login-icon {
        font-size: 2.5rem;
      }

      .login-subtitle {
        font-size: 0.9rem;
      }

      form {
        gap: 1.25rem;
      }

      .form-group {
        gap: 0.4rem;
      }

      label {
        font-size: 0.85rem;
      }

      input {
        padding: 0.65rem 0.9rem;
        font-size: 0.9rem;
        border-radius: 0.4rem;
      }

      button {
        padding: 0.65rem 1rem;
        font-size: 0.9rem;
        border-radius: 0.4rem;
      }

      .erro {
        padding: 0.75rem;
        font-size: 0.85rem;
        border-radius: 0.4rem;
      }

      .login-footer {
        padding-top: 1rem;
        font-size: 0.8rem;
      }
    }

    /* Celulares (480px e abaixo) */
    @media (max-width: 480px) {
      body {
        padding: 0.75rem;
        min-height: 100vh;
      }

      .container {
        padding: 1.5rem 1.25rem;
        max-width: 100%;
        border-radius: 0.4rem;
      }

      .login-header {
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: 1.35rem;
        margin-bottom: 0.4rem;
      }

      .login-icon {
        font-size: 2.2rem;
        margin-bottom: 0.75rem;
      }

      .login-subtitle {
        font-size: 0.85rem;
      }

      form {
        gap: 1.1rem;
      }

      .form-group {
        gap: 0.35rem;
      }

      label {
        font-size: 0.8rem;
        font-weight: 600;
      }

      label i {
        width: 0.9rem;
        font-size: 0.9rem;
      }

      input {
        padding: 0.6rem 0.8rem;
        font-size: 0.9rem;
        border-radius: 0.35rem;
        border: 1px solid var(--border-color);
      }

      input::placeholder {
        font-size: 0.85rem;
      }

      button {
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        border-radius: 0.35rem;
      }

      .erro {
        padding: 0.6rem;
        font-size: 0.8rem;
        border-radius: 0.35rem;
        gap: 0.4rem;
      }

      .erro i {
        font-size: 0.9rem;
      }

      .login-footer {
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
        font-size: 0.75rem;
      }
    }

    /* Muito pequeno (320px e abaixo) */
    @media (max-width: 320px) {
      body {
        padding: 0.5rem;
      }

      .container {
        padding: 1.25rem 1rem;
      }

      .login-header {
        margin-bottom: 1.25rem;
      }

      h1 {
        font-size: 1.2rem;
      }

      .login-icon {
        font-size: 2rem;
        margin-bottom: 0.6rem;
      }

      .login-subtitle {
        font-size: 0.8rem;
      }

      label {
        font-size: 0.75rem;
      }

      input {
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
      }

      button {
        padding: 0.55rem 0.9rem;
        font-size: 0.8rem;
      }

      .erro {
        padding: 0.5rem;
        font-size: 0.75rem;
      }

      .login-footer {
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Header -->
    <div class="login-header">
      <div class="login-icon">
        <i class="fas fa-lock"></i>
      </div>
      <h1>Acesso Seguro</h1>
      <p class="login-subtitle">Fluxo de Caixa</p>
    </div>

    <!-- Form -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">
          <i class="fas fa-envelope"></i> Email
        </label>
        <input 
          type="email" 
          id="email" 
          placeholder="seu@email.com" 
          required
        >
      </div>

      <div class="form-group">
        <label for="password">
          <i class="fas fa-key"></i> Senha
        </label>
        <input 
          type="password" 
          id="password" 
          placeholder="Digite sua senha" 
          required
        >
      </div>

      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>

      <div class="erro" id="erro">
        <i class="fas fa-exclamation-circle"></i>
        <span></span>
      </div>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>&copy; 2025 Fluxo de Caixa - Sistema Seguro </p>
    </div>
  </div>

  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      setPersistence,
      browserLocalPersistence,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdok04xMPLJQ4FUhM9b6LFfSZyWDPeEoQ",
      authDomain: "sistema-caixa-efe6e.firebaseapp.com",
      projectId: "sistema-caixa-efe6e",
      storageBucket: "sistema-caixa-efe6e.appspot.com",
      messagingSenderId: "203332128049",
      appId: "1:203332128049:web:018082ef4705aa26e9b410"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById("loginForm");
    const erro = document.getElementById("erro");
    const button = form.querySelector("button");

    /* ✅ se já estiver logado → pula login */
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "caixa.html";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      erro.classList.remove("show");
      button.disabled = true;
      button.classList.add("loading");

      const email = document.getElementById("email").value;
      const senha = document.getElementById("password").value;

      try {
        // mantém login salvo
        await setPersistence(auth, browserLocalPersistence);
        await signInWithEmailAndPassword(auth, email, senha);
        window.location.href = "html/caixa.html";

      } catch (err) {
        console.error(err);
        erro.classList.add("show");
        button.disabled = false;
        button.classList.remove("loading");
      }
    });

  </script>

</body>

</html>
